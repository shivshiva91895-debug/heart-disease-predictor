<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Prediction</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Heart Disease Prediction</h2>

        <form action="/predict" method="post">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" name="age" placeholder="Age" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" name="sex" placeholder="Sex (0/1)" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" name="cp" placeholder="Chest Pain" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" name="trestbps" placeholder="Resting BP" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" name="chol" placeholder="Cholesterol" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" name="fbs" placeholder="Fasting Sugar" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" name="restecg" placeholder="Rest ECG" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" name="thalach" placeholder="Max Heart Rate" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" name="exang" placeholder="Exercise Angina" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" name="oldpeak" placeholder="Oldpeak" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" name="slope" placeholder="Slope" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" name="ca" placeholder="CA" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" name="thal" placeholder="Thal" required>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success px-4">Predict</button>
            </div>

        </form>

        <div class="text-center mt-4">
            <h4 style="color:{% if 'High' in prediction_text %}red{% else %}green{% endif %};">
                {{ prediction_text }}
            </h4>
        </div>

    </div>
</div>

</body>
</html>
